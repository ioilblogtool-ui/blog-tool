<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 배경 -->
  <rect width="1200" height="630" fill="#18181A"/>

  <!-- 우상단 원형 accent -->
  <circle cx="1100" cy="0" r="200" fill="#0F6E56" fill-opacity="0.07"/>
  <!-- 좌하단 원형 accent -->
  <circle cx="100" cy="630" r="140" fill="#1D9E75" fill-opacity="0.05"/>

  <!-- 로고 아이콘 (좌상단) -->
  <rect x="60" y="52" width="28" height="28" rx="5" fill="#1D9E75"/>
  <rect x="96" y="52" width="28" height="28" rx="5" fill="none" stroke="#1D9E75" stroke-width="2"/>
  <rect x="60" y="88" width="28" height="28" rx="5" fill="none" stroke="#1D9E75" stroke-width="2"/>
  <rect x="96" y="88" width="28" height="28" rx="5" fill="#0F6E56"/>
  <line x1="103" y1="102" x2="117" y2="102" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="110" y1="95" x2="110" y2="109" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 로고 텍스트 -->
  <text x="138" y="69" font-family="system-ui, -apple-system, sans-serif"
    font-size="18" font-weight="500" fill="#FFFFFF" letter-spacing="-0.3">비교계산소</text>
  <text x="138" y="88" font-family="system-ui, -apple-system, sans-serif"
    font-size="12" fill="#555553">bigyocalc.com</text>

  <!-- eyebrow -->
  <text x="60" y="210" font-family="system-ui, -apple-system, sans-serif"
    font-size="14" font-weight="500" fill="#1D9E75" letter-spacing="1.5">숫자로 더 잘 판단하세요</text>

  <!-- 메인 타이틀 -->
  <text x="60" y="278" font-family="system-ui, -apple-system, sans-serif"
    font-size="52" font-weight="500" fill="#FFFFFF" letter-spacing="-1">세상의 궁금한 숫자,</text>
  <text x="60" y="344" font-family="system-ui, -apple-system, sans-serif"
    font-size="52" font-weight="500" fill="#FFFFFF" letter-spacing="-1">한 번에 비교 계산</text>

  <!-- 서브 텍스트 -->
  <text x="60" y="396" font-family="system-ui, -apple-system, sans-serif"
    font-size="20" fill="#5F5E5A">연봉·성과급·육아휴직·출산지원금을 빠르게 계산하고 비교합니다</text>

  <!-- 하단 구분선 -->
  <line x1="60" y1="500" x2="1140" y2="500" stroke="#2E2E2C" stroke-width="1"/>

  <!-- 스탯 3개 -->
  <text x="60" y="548" font-family="system-ui, -apple-system, sans-serif"
    font-size="32" font-weight="500" fill="#FFFFFF">13</text>
  <text x="60" y="575" font-family="system-ui, -apple-system, sans-serif"
    font-size="13" fill="#5F5E5A">운영 중 계산기</text>

  <text x="260" y="548" font-family="system-ui, -apple-system, sans-serif"
    font-size="32" font-weight="500" fill="#FFFFFF">4</text>
  <text x="260" y="575" font-family="system-ui, -apple-system, sans-serif"
    font-size="13" fill="#5F5E5A">카테고리</text>

  <text x="460" y="548" font-family="system-ui, -apple-system, sans-serif"
    font-size="32" font-weight="500" fill="#FFFFFF">2</text>
  <text x="460" y="575" font-family="system-ui, -apple-system, sans-serif"
    font-size="13" fill="#5F5E5A">인터랙티브 리포트</text>
</svg>
